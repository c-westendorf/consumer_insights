<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Data Load</title>
</head>
<body>
    <h1>Testing Data Load</h1>
    <div id="output"></div>

    <script src="js/data_attention.js"></script>
    <script>
        const output = document.getElementById('output');

        if (typeof window.insightData !== 'undefined') {
            output.innerHTML = '<p style="color: green;">✓ Data loaded successfully!</p>';
            output.innerHTML += '<p>Has business_health? ' + (!!window.insightData.business_health) + '</p>';
            output.innerHTML += '<p>Has behavioral_reconciliation? ' + (!!window.insightData.behavioral_reconciliation) + '</p>';
            output.innerHTML += '<p>Has strategic_pillars? ' + (!!window.insightData.strategic_pillars) + '</p>';

            console.log('Full data object:', window.insightData);
            console.log('Business health:', window.insightData.business_health);
            console.log('Behavioral reconciliation:', window.insightData.behavioral_reconciliation);
        } else {
            output.innerHTML = '<p style="color: red;">✗ Data NOT loaded!</p>';
        }
    </script>
</body>
</html>
