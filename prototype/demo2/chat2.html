<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsightOS &mdash; Conversational View</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="css/demo2.css" />
  <style>
    .chat-page { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

    .chat-window {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 230px);
      min-height: 520px;
    }

    .chat-topbar {
      background: #0033A0;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-topbar h2 { color: white; font-size: 1rem; margin: 0; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #F5F7FA;
    }

    .chat-row { display: flex; gap: 12px; align-items: flex-start; }
    .user-row      { flex-direction: row-reverse; }
    .assistant-row { flex-direction: row; }

    .chat-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; flex-shrink: 0;
    }
    .user-avatar      { background: #E3ECFF; color: #0033A0; }
    .assistant-avatar { background: #0033A0; color: white; }

    .chat-bubble {
      max-width: 80%;
      padding: 13px 17px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.55;
    }
    .user-bubble { background: #0033A0; color: white; border-radius: 12px 2px 12px 12px; font-weight: 500; }
    .assistant-bubble {
      background: white; border: 1px solid #DDE1E7;
      border-radius: 2px 12px 12px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* Insight contract */
    .insight-contract { display: flex; flex-direction: column; gap: 9px; }
    .ic-section { border-left: 3px solid #DDE1E7; padding: 5px 12px; }
    .ic-label {
      display: block; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: #767676; margin-bottom: 3px;
    }
    .ic-content { font-size: 0.87rem; line-height: 1.5; }

    /* Next clicks */
    .next-clicks-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
    .next-click-link {
      display: inline-block; padding: 5px 11px;
      border: 1.5px solid #0033A0; border-radius: 16px;
      color: #0033A0; font-size: 0.78rem; font-weight: 600;
      text-decoration: none; transition: background 0.15s;
    }
    .next-click-link:hover { background: #0033A0; color: white; }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .t-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #0033A0; animation: tdot 1.2s infinite ease-in-out;
    }
    .t-dot:nth-child(2) { animation-delay: 0.2s; }
    .t-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%,80%,100% { opacity:0.25; transform:scale(0.85); }
      40%          { opacity:1;    transform:scale(1.1);  }
    }

    /* Prompt chips */
    .prompt-chips {
      padding: 10px 16px;
      background: #F5F7FA;
      border-top: 1px solid #DDE1E7;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
    }
    .prompt-chips .chips-label {
      font-size: 0.75rem; color: #767676; font-weight: 600; white-space: nowrap;
    }
    .prompt-chip {
      padding: 6px 13px; border: 1.5px solid #0033A0;
      border-radius: 20px; color: #0033A0; font-size: 0.78rem;
      font-weight: 600; cursor: pointer; background: white;
      transition: background 0.15s;
      font-family: inherit;
    }
    .prompt-chip:hover { background: #0033A0; color: white; }
    .prompt-chip.played { border-color: #DDE1E7; color: #767676; background: #F5F7FA; cursor: default; }

    .chat-footer {
      padding: 10px 16px;
      background: white;
      border-top: 1px solid #DDE1E7;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .chat-footer input {
      flex: 1; padding: 9px 14px; border: 1.5px solid #DDE1E7;
      border-radius: 8px; font-size: 0.87rem; outline: none;
      color: #767676; font-family: inherit; background: #F5F7FA;
    }
    .chat-footer .send-hint { font-size: 0.75rem; color: #767676; white-space: nowrap; }

    .prompt-counter { font-size: 0.78rem; color: rgba(255,255,255,0.75); }
  </style>
</head>
<body>
<div class="chat-page">

  <!-- Header -->
  <div class="d2-header" style="margin-bottom:14px;">
    <div class="d2-header-left">
      <h1>InsightOS &mdash; Conversational View</h1>
      <div class="d2-date">4 scripted prompts &nbsp;&bull;&nbsp; Answer &rarr; Evidence &rarr; Confidence &rarr; Next clicks</div>
    </div>
    <nav class="d2-nav">
      <a href="index.html">Home</a>
      <a href="weekly.html">Weekly</a>
      <a href="monthly.html">Monthly</a>
      <a href="quarterly.html">Quarterly</a>
      <a href="chat2.html" class="active">Chat</a>
    </nav>
  </div>

  <!-- Chat window -->
  <div class="chat-window">

    <div class="chat-topbar">
      <h2>InsightOS Assistant</h2>
      <span class="prompt-counter" id="prompt-counter">Starting&hellip;</span>
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <!-- Prompt chips -->
    <div class="prompt-chips" id="prompt-chips">
      <span class="chips-label">Jump to:</span>
      <button class="prompt-chip" id="chip-0" onclick="scrollToPrompt(0)">How is the business performing?</button>
      <button class="prompt-chip" id="chip-1" onclick="scrollToPrompt(1)">Blip or momentum?</button>
      <button class="prompt-chip" id="chip-2" onclick="scrollToPrompt(2)">Who is driving the decline?</button>
      <button class="prompt-chip" id="chip-3" onclick="scrollToPrompt(3)">What behaviors matter most?</button>
    </div>

    <div class="chat-footer">
      <input type="text" placeholder="Live conversational interface coming in Phase 2&hellip;" readonly />
      <span class="send-hint">Phase 1: scripted demo</span>
    </div>

  </div>

  <div class="d2-footer">
    InsightOS &mdash; Illustrative demo &nbsp;&bull;&nbsp; Next click links open evidence artifacts in Weekly Brief
  </div>

</div>

<script src="js/demo2_data.js"></script>
<script>
// ── Chat engine ───────────────────────────────────────────────────────────
const CHAT_SCRIPT = DEMO2_DATA.chatScript;
const messageAnchors = {};   // id → DOM element
let promptsDone = 0;

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(playChat, 600);
});

async function playChat() {
  for (let i = 0; i < CHAT_SCRIPT.length; i++) {
    const prompt = CHAT_SCRIPT[i];
    await sleep(i === 0 ? 800 : 1800);
    const userEl = await addUserMessage(prompt.userText, i);
    messageAnchors[i] = userEl;
    await sleep(1400);
    await addAssistantMessage(prompt);
    promptsDone++;
    document.getElementById('prompt-counter').textContent =
      `${promptsDone} of ${CHAT_SCRIPT.length} prompts`;
    // Mark chip as played
    const chip = document.getElementById(`chip-${i}`);
    if (chip) chip.classList.add('played');
  }
  document.getElementById('prompt-counter').textContent = 'Demo complete';
}

async function addUserMessage(text, idx) {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'chat-row user-row';
  row.dataset.promptIdx = idx;
  row.innerHTML = `
    <div class="chat-avatar user-avatar">YOU</div>
    <div class="chat-bubble user-bubble">${text}</div>`;
  container.appendChild(row);
  scrollChat();
  return row;
}

async function addAssistantMessage(prompt) {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'chat-row assistant-row';

  const avatar = document.createElement('div');
  avatar.className = 'chat-avatar assistant-avatar';
  avatar.textContent = 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble assistant-bubble';
  bubble.innerHTML = `<div class="typing-indicator"><span class="t-dot"></span><span class="t-dot"></span><span class="t-dot"></span></div>`;

  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);
  scrollChat();

  await sleep(1500);
  bubble.innerHTML = '';

  const block = buildInsightBlock(prompt);
  bubble.appendChild(block);

  // Animate each section in
  const sections = block.querySelectorAll('.ic-section');
  for (const sec of sections) {
    sec.style.opacity = '0';
    sec.style.transform = 'translateY(5px)';
  }
  for (const sec of sections) {
    await sleep(110);
    sec.style.transition = 'all 0.22s ease';
    sec.style.opacity = '1';
    sec.style.transform = 'translateY(0)';
    scrollChat();
  }
}

function buildInsightBlock(prompt) {
  const wrap = document.createElement('div');
  wrap.className = 'insight-contract';

  wrap.appendChild(makeSection('Answer', prompt.answer));
  wrap.appendChild(makeSection('Evidence', prompt.evidence));

  const confHtml = `
    <span class="confidence-badge medium" style="font-size:0.76rem;padding:4px 10px;">
      <span class="cb-dot"></span>${prompt.confidence}
    </span>
    <span class="confidence-detail" style="display:inline;margin-left:8px;">${prompt.confidenceDetail}</span>`;
  wrap.appendChild(makeSection('Confidence', confHtml, true));

  const linksHtml = prompt.nextClicks.map(nc =>
    `<a href="weekly.html#${nc.anchor}" class="next-click-link" target="_blank">&rarr; ${nc.label}</a>`
  ).join('');
  wrap.appendChild(makeSection('Next clicks', `<div class="next-clicks-row">${linksHtml}</div>`, true));

  return wrap;
}

function makeSection(label, contentHtml, raw = false) {
  const div = document.createElement('div');
  div.className = 'ic-section';
  div.innerHTML = `<span class="ic-label">${label}</span><div class="ic-content">${contentHtml}</div>`;
  return div;
}

function scrollToPrompt(idx) {
  const el = messageAnchors[idx];
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    // Not yet played — scroll to bottom
    scrollChat();
  }
}

function scrollChat() {
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
</script>
</body>
</html>
